<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>QR / バーコード スキャン</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",sans-serif;background:#111;color:#fff;display:flex;flex-direction:column}
#wrap{position:relative;flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#000;min-height:300px}
video{width:100%;height:100%;object-fit:cover}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
#frame{width:78%;max-width:320px;aspect-ratio:4/3;border:3px solid rgba(255,255,255,.9);border-radius:16px;box-shadow:0 0 0 9999px rgba(0,0,0,.45);display:none}
#start{pointer-events:auto;display:flex;flex-direction:column;align-items:center;gap:16px;padding:24px}
#startBtn{background:#1a73e8;color:#fff;border:none;border-radius:14px;padding:18px 34px;font-size:18px;font-weight:700;font-family:inherit}
#startNote{font-size:12px;color:#aaa;text-align:center;line-height:1.6;max-width:300px}
#msg{margin-top:18px;font-size:14px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.8);text-align:center;padding:0 20px;display:none}
#target{position:absolute;top:14px;left:0;right:0;text-align:center;font-size:13px;font-weight:700;color:#9ecbff;text-shadow:0 1px 4px rgba(0,0,0,.8)}
#bar{padding:16px;display:flex;flex-direction:column;gap:10px;background:#1c1c1e}
#result{font-size:14px;color:#34c759;text-align:center;min-height:20px;font-weight:700;word-break:break-all}
#fmt{font-size:11px;color:#8e8e93;text-align:center;min-height:14px}
#manual{width:100%;padding:12px;border-radius:10px;border:1px solid #555;background:#2c2c2e;color:#fff;font-size:16px;font-family:inherit;outline:none}
#manual::placeholder{color:#888}
#manual:focus{border-color:#1a73e8}
.row{display:flex;gap:10px}
button.act{flex:1;padding:14px;border:none;border-radius:11px;font-size:15px;font-weight:700;font-family:inherit}
#useBtn{background:#1a73e8;color:#fff}
#againBtn{background:#3a3a3c;color:#fff}
#closeBtn{background:#3a3a3c;color:#fff}
#hint{font-size:11px;color:#888;text-align:center}
</style>
</head>
<body>
<div id="wrap">
  <video id="vid" playsinline muted></video>
  <div id="overlay">
    <div id="target"></div>
    <div id="frame"></div>
    <div id="start">
      <button id="startBtn">カメラを開始</button>
      <div id="startNote">ボタンを押すとカメラの使用許可を求められます。<br>必ず Safari か Chrome で開いてください（Teamsなどアプリ内ブラウザでは動かないことがあります）。<br>QR・バーコード（Serial No.）の両方を読み取れます。</div>
    </div>
    <div id="msg"></div>
  </div>
</div>
<div id="bar">
  <div id="result"></div>
  <div id="fmt"></div>
  <input id="manual" type="text" inputmode="numeric" placeholder="読み取れない場合は直接入力">
  <div class="row">
    <button class="act" id="useBtn">この値を使う</button>
    <button class="act" id="againBtn">もう一度</button>
  </div>
  <div class="row">
    <button class="act" id="closeBtn">閉じる</button>
  </div>
  <div id="hint">読み取り後この画面は自動で閉じ、元のアプリに値が入ります</div>
</div>

<script src="zxing.js"></script>
<script>
(function(){
  var vid=document.getElementById('vid');
  var manual=document.getElementById('manual');
  var resultEl=document.getElementById('result');
  var fmtEl=document.getElementById('fmt');
  var msg=document.getElementById('msg');
  var frame=document.getElementById('frame');
  var startBox=document.getElementById('start');
  var reader=null, locked=false;

  var params=new URLSearchParams(location.search);
  var label=params.get('label')||'';
  if(label) document.getElementById('target').textContent='スキャン対象：'+label;

  function showMsg(text,isErr){ msg.style.display='block'; msg.textContent=text; msg.style.color=isErr?'#ff8a80':'#fff'; }

  function stopReader(){ if(reader){ try{reader.reset();}catch(e){} } }

  function send(val){
    val=String(val||'').trim();
    if(!val){ alert('値が空です'); return; }
    if(window.opener){ try{ window.opener.postMessage({type:'QR_SCAN_RESULT', value:val}, '*'); }catch(e){} }
    showMsg('✓ 送信しました');
    setTimeout(function(){ try{window.close();}catch(e){} }, 250);
  }

  document.getElementById('useBtn').addEventListener('click',function(){ send(manual.value); });
  document.getElementById('closeBtn').addEventListener('click',function(){
    stopReader();
    if(window.opener){ try{ window.opener.postMessage({type:'QR_SCAN_CANCEL'}, '*'); }catch(e){} }
    try{window.close();}catch(e){}
  });
  document.getElementById('againBtn').addEventListener('click',function(){
    locked=false; resultEl.textContent=''; fmtEl.textContent=''; manual.value='';
    startCamera();
  });
  document.getElementById('startBtn').addEventListener('click', startCamera);

  function buildReader(){
    var hints=new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.QR_CODE,
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.EAN_13
    ]);
    var r=new ZXing.BrowserMultiFormatReader(hints, 300);
    return r;
  }

  function onResult(text, fmt){
    locked=true;
    stopReader();
    var val=String(text).trim();
    resultEl.textContent='読み取り：'+val;
    fmtEl.textContent='形式：'+fmt;
    manual.value=val;
    showMsg('✓ 「この値を使う」を押すと送信します');
    if('vibrate' in navigator){ try{navigator.vibrate(80);}catch(e){} }
  }

  function fmtName(f){
    try{
      var B=ZXing.BarcodeFormat;
      if(f===B.QR_CODE)return 'QRコード';
      if(f===B.CODE_128)return 'バーコード(CODE128)';
      if(f===B.EAN_13)return 'バーコード(EAN-13)';
    }catch(e){}
    return 'コード';
  }

  function startCamera(){
    startBox.style.display='none';
    if(typeof ZXing==='undefined'){
      showMsg('読み取りライブラリ(zxing.js)を読み込めませんでした。zxing.js が index.html と同じ場所にあるか確認してください。直接入力は使えます。', true);
      return;
    }
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      showMsg('このブラウザはカメラに対応していません。Safari/Chromeで開いてください。直接入力は使えます。', true);
      return;
    }
    showMsg('カメラを起動中…');
    try{ reader=buildReader(); }catch(e){ showMsg('初期化に失敗しました：'+e, true); return; }
    reader.decodeFromConstraints(
      { video: { facingMode: { ideal: 'environment' } } },
      vid,
      function(result, err){
        if(result && !locked){ onResult(result.getText(), fmtName(result.getBarcodeFormat())); }
        /* err は読取待ちの間 NotFoundException が毎フレーム来るので無視 */
      }
    ).then(function(){
      frame.style.display='block';
      showMsg('QR / バーコードを枠内に合わせてください');
    }).catch(function(e){
      var name=e&&e.name?e.name:'';
      var t='カメラを起動できませんでした。';
      if(name==='NotAllowedError'||name==='SecurityError') t='カメラの使用が「許可されませんでした」。アドレスバー左の「ぁ(AA)」→ Webサイトの設定 → カメラ を「許可」にして再読み込みしてください。';
      else if(name==='NotFoundError'||name==='OverconstrainedError') t='カメラが見つかりませんでした。';
      else if(name==='NotReadableError') t='カメラが他のアプリで使用中の可能性があります。';
      else if(name) t='カメラを起動できませんでした（'+name+'）。Safari/Chromeで開いているか確認してください。';
      showMsg(t+' 直接入力は使えます。', true);
    });
  }
})();
</script>
</body>
</html>
